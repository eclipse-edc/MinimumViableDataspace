# This seed job creates a participant context in the provider's IdentityHub and a holder entry in the IssuerService.

---
apiVersion: batch/v1
kind: Job
metadata:
  name: identityhub-seed
  namespace: provider
  labels:
    app: identityhub-seed
    type: edc-job
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: identityhub-seed
        type: edc-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dependencies
          image: curlimages/curl:latest
          env:
            - name: KC_HOST
              value: "http://keycloak.mvd-common.svc.cluster.local:8080"

          command:
            - sh
            - -c
            - |
              until curl -sf http://identityhub.provider.svc.cluster.local:7080/api/check/readiness; do
                echo "Waiting for identityhub to be ready..."
                sleep 5
              done
              echo ""
              echo "IdentityHub is ready!"

              until curl -sf http://issuerservice.issuer.svc.cluster.local:10010/api/check/readiness; do
                echo "Waiting for issuer service to be ready..."
                sleep 5
              done
              echo ""
              echo "IssuerService is ready!"
              
              # Wait for Keycloak
              echo "Waiting for Keycloak to be ready..."
              until wget -q --spider "${KC_HOST}/realms/mvd/.well-known/openid-configuration" > /dev/null 2>&1; do
                echo "Keycloak not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "Keycloak is ready!"
      containers:

        - name: seed-identityhub
          image: curlimages/curl:latest
          env:
              - name: KC_HOST
                value: "http://keycloak.mvd-common.svc.cluster.local:8080"
              - name: PROVISIONER_CLIENT_ID
                value: "provisioner"
              - name: PROVISIONER_CLIENT_SECRET
                value: "provisioner-secret"
              - name: ADMIN_CLIENT_ID
                value: "admin"
              - name: ADMIN_CLIENT_SECRET
                value: "edc-v-admin-secret"
              - name: IH_URL
                value: "http://identityhub.provider.svc.cluster.local:7081/api/identity/v1alpha/participants/"
              - name: PARTICIPANT_DID
                value: "did:web:identityhub.provider.svc.cluster.local%3A7083:provider"
              - name: PARTICIPANT_ID
                value: "provider-participant"
              - name: ISSUER_CLIENT_ID
                value: "issuer"
              - name: ISSUER_CLIENT_SECRET
                value: "issuer-secret"
              - name: ISSUER_ADMIN_URL
                value: "http://issuerservice.issuer.svc.cluster.local:10013/api/admin/v1alpha"
          command:
            - sh
            - -c
            - |
              set -e
              
              echo ""
              echo "================================================"
              echo "Step 1: Create provider Holder in IssuerService"
              echo "================================================"

              echo "Waiting for issuer client to be ready in Keycloak..."
              MAX_RETRIES=30
              RETRY=0
              ISSUER_TOKEN=""
              while [ -z "$ISSUER_TOKEN" ]; do
                if [ "${RETRY}" -ge "${MAX_RETRIES}" ]; then
                  echo "✗ Failed to get issuer token after ${MAX_RETRIES} attempts"
                  exit 1
                fi
                ISSUER_TOKEN=$(curl -sf -X POST "${KC_HOST}/realms/mvd/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${ISSUER_CLIENT_ID}" \
                  -d "client_secret=${ISSUER_CLIENT_SECRET}" \
                  -d "scope=issuer-admin-api:write" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p' || echo "")
                
                if [ -z "$ISSUER_TOKEN" ]; then
                  echo "Issuer client not ready yet, retrying in 5 seconds..."
                  RETRY=$((RETRY + 1))
                  sleep 5
                fi
              done
              echo "✓ Issuer token obtained"

              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${ISSUER_ADMIN_URL}/participants/issuer/holders" \
                -H "Authorization: Bearer ${ISSUER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"did\": \"${PARTICIPANT_DID}\",
                  \"holderId\": \"${PARTICIPANT_DID}\",
                  \"name\": \"MVD provider Participant\"
                }")
              HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
              BODY=$(echo "${RESPONSE}" | sed '$d')
              if [ "${HTTP_STATUS}" -eq 200 ] || [ "${HTTP_STATUS}" -eq 201 ]; then
                echo "✓ provider holder created in IssuerService"
              elif [ "${HTTP_STATUS}" -eq 409 ]; then
                echo "⚠ provider holder already exists (HTTP 409), skipping."
              else
                echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                echo "Response body: ${BODY}"
                exit 1
              fi

              echo "================================================"
              echo "Step 2: Create provider Participant Context in IdentityHub"
              echo "================================================"
              
              PROVISIONER_TOKEN=$(curl -sf -X POST "${KC_HOST}/realms/mvd/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${PROVISIONER_CLIENT_ID}" \
                  -d "client_secret=${PROVISIONER_CLIENT_SECRET}" \
                  -d "scope=issuer-admin-api:write" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

                if [ -z "$PROVISIONER_TOKEN" ]; then
                  echo "Failed to get issuer token"
                  exit 1
                fi

              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${IH_URL}" \
                -H "Authorization: Bearer ${PROVISIONER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"roles\": [],
                  \"serviceEndpoints\": [
                    {
                      \"type\": \"CredentialService\",
                      \"serviceEndpoint\": \"http://identityhub.provider.svc.cluster.local:7082/api/credentials/v1/participants/${PARTICIPANT_ID}\",
                      \"id\": \"provider-credentialservice-1\"
                    },
                    {
                      \"type\": \"ProtocolEndpoint\",
                      \"serviceEndpoint\": \"http://controlplane.provider.svc.cluster.local:8082/api/dsp/2025-1\",
                      \"id\": \"provider-dsp\"
                    }
                  ],
                  \"active\": true,
                  \"participantId\": \"${PARTICIPANT_DID}\",
                  \"participantContextId\": \"${PARTICIPANT_ID}\",
                  \"did\": \"${PARTICIPANT_DID}\",
                  \"key\": {
                    \"keyId\": \"${PARTICIPANT_DID}#key-1\",
                    \"privateKeyAlias\": \"${PARTICIPANT_DID}#key-1\",
                    \"keyGeneratorParams\": {
                      \"algorithm\": \"EC\"
                    }
                  }
                }")
              HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
              BODY=$(echo "${RESPONSE}" | sed '$d')
              if [ "${HTTP_STATUS}" -eq 200 ] || [ "${HTTP_STATUS}" -eq 201 ]; then
                echo "✓ provider participant context created"
              elif [ "${HTTP_STATUS}" -eq 409 ]; then
                echo "⚠ provider participant context already exists (HTTP 409), skipping."
              else
                echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                echo "Response body: ${BODY}"
                exit 1
              fi

              echo "================================================"
              echo "Step 3: Requesting credential issuance"
              echo "================================================"
              
              ADMIN_TOKEN=$(curl -sf -X POST "${KC_HOST}/realms/mvd/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${ADMIN_CLIENT_ID}" \
                  -d "client_secret=${ADMIN_CLIENT_SECRET}" \
                  -d "scope=identity-api:write" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

                if [ -z "$ADMIN_TOKEN" ]; then
                  echo "Failed to get OAuth2 token"
                  exit 1
                fi
              
              HOLDER_PID="credential-request-1"
              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${IH_URL}${PARTICIPANT_ID}/credentials/request" \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                      \"issuerDid\": \"did:web:issuerservice.issuer.svc.cluster.local%3A10016:issuer\",
                      \"holderPid\": \"${HOLDER_PID}\",
                      \"credentials\": [{
                        \"format\": \"VC1_0_JWT\",
                        \"type\": \"MembershipCredential\",
                        \"id\": \"membership-credential-def\"
                      },
                      {
                        \"format\": \"VC1_0_JWT\",
                        \"type\": \"ManufacturerCredential\",
                        \"id\": \"manufacturer-credential-def\"
                    }]
                  }")
              
              HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
              if [ "${HTTP_STATUS}" -eq 201 ]; then
                echo "✓ provider participant context created"
              else
                echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                echo "Response body: ${RESPONSE}"
                exit 1
              fi
              
              echo "================================================"
              echo "Step 4: Wait for credentials to be issued"
              echo "================================================"

              STATUS=""
              MAX_RETRIES=30
              RETRY=0
              while [ "${STATUS}" != "ISSUED" ]; do
                if [ "${RETRY}" -ge "${MAX_RETRIES}" ]; then
                  echo "✗ Credentials not ISSUED after ${MAX_RETRIES} attempts"
                  exit 1
                fi
                RESPONSE=$(curl -sS -w "\n%{http_code}" "${IH_URL}${PARTICIPANT_ID}/credentials/request/${HOLDER_PID}" \
                  -H "Authorization: Bearer ${ADMIN_TOKEN}")
                HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
                BODY=$(echo "${RESPONSE}" | sed '$d')
                if [ "${HTTP_STATUS}" -ne 200 ]; then
                  echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                  echo "Response body: ${BODY}"
                  exit 1
                fi
                STATUS=$(echo "${BODY}" | sed -n 's/.*"status":"\([^"]*\)".*/\1/p')
                echo "Credential status: ${STATUS}"
                RETRY=$((RETRY + 1))
                sleep 5
              done
              echo "✓ Credentials are ISSUED"

              echo ""
              echo "================================================"
              echo "IdentityHub seeding completed successfully!"
              echo "================================================"