## This seed job creates a participant context in the consumer's IdentityHub and a holder entry in the IssuerService.

---
apiVersion: batch/v1
kind: Job
metadata:
  name: identityhub-seed
  namespace: provider
  labels:
    app: identityhub-seed
    type: edc-job
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: identityhub-seed
        type: edc-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dependencies
          image: curlimages/curl:latest
          env:
            - name: KC_HOST
              value: "http://keycloak.mvd-common.svc.cluster.local:8080"

          command:
            - sh
            - -c
            - |
              until curl -sf http://identityhub.provider.svc.cluster.local:7080/api/check/readiness; do
                echo "Waiting for identityhub to be ready..."
                sleep 5
              done
              echo ""
              echo "IdentityHub is ready!"

              until curl -sf http://issuerservice.issuer.svc.cluster.local:10010/api/check/readiness; do
                echo "Waiting for issuerservice to be ready..."
                sleep 5
              done
              echo ""
              echo "IssuerService is ready!"
              
              # Wait for Keycloak
              echo "Waiting for Keycloak to be ready..."
              until wget -q --spider "${KC_HOST}/realms/mvd/.well-known/openid-configuration" > /dev/null 2>&1; do
                echo "Keycloak not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "Keycloak is ready!"
      containers:
        - name: seed-issuerservice
          image: curlimages/curl:latest
          env:
            - name: KC_HOST
              value: "http://keycloak.mvd-common.svc.cluster.local:8080"
            - name: ISSUER_CLIENT_ID
              value: "issuer"
            - name: ISSUER_CLIENT_SECRET
              value: "issuer-secret"
            - name: ISSUER_ADMIN_URL
              value: "http://issuerservice.issuer.svc.cluster.local:10013/api/admin/v1alpha"
            - name: PARTICIPANT_DID
              value: "did:web:identityhub.provider.svc.cluster.local%3A7083:provider"
            - name: PARTICIPANT_ID
              value: "provider-participant"
          command:
              - sh
              - -c
              - |
                set -e
                echo ""
                echo "================================================"
                echo "Step 1: Create provider Holder in IssuerService"
                echo "================================================"

                ISSUER_TOKEN=$(curl -sf -X POST "${KC_HOST}/realms/mvd/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${ISSUER_CLIENT_ID}" \
                  -d "client_secret=${ISSUER_CLIENT_SECRET}" \
                  -d "scope=issuer-admin-api:write" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

                if [ -z "$ISSUER_TOKEN" ]; then
                  echo "Failed to get issuer token"
                  exit 1
                fi

                RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${ISSUER_ADMIN_URL}/participants/issuer/holders" \
                  -H "Authorization: Bearer ${ISSUER_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"did\": \"${PARTICIPANT_DID}\",
                    \"holderId\": \"${PARTICIPANT_DID}\",
                    \"name\": \"MVD provider Participant\"
                  }")
                HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
                BODY=$(echo "${RESPONSE}" | sed '$d')
                if [ "${HTTP_STATUS}" -eq 200 ] || [ "${HTTP_STATUS}" -eq 201 ]; then
                  echo "✓ provider holder created in IssuerService"
                elif [ "${HTTP_STATUS}" -eq 409 ]; then
                  echo "⚠ provider holder already exists (HTTP 409), skipping."
                else
                  echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                  echo "Response body: ${BODY}"
                  exit 1
                fi
        - name: seed-identityhub
          image: curlimages/curl:latest
          env:
              - name: KC_HOST
                value: "http://keycloak.mvd-common.svc.cluster.local:8080"
              - name: PROVISIONER_CLIENT_ID
                value: "provisioner"
              - name: PROVISIONER_CLIENT_SECRET
                value: "provisioner-secret"
              - name: IH_URL
                value: "http://identityhub.provider.svc.cluster.local:7081/api/identity/v1alpha/participants/"
              - name: PARTICIPANT_DID
                value: "did:web:identityhub.provider.svc.cluster.local%3A7083:provider"
              - name: PARTICIPANT_ID
                value: "provider-participant"
          command:
            - sh
            - -c
            - |
              set -e

              echo "================================================"
              echo "Step 1: Create provider Participant Context in IdentityHub"
              echo "================================================"
              
              PROVISIONER_TOKEN=$(curl -sf -X POST "${KC_HOST}/realms/mvd/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${PROVISIONER_CLIENT_ID}" \
                  -d "client_secret=${PROVISIONER_CLIENT_SECRET}" \
                  -d "scope=issuer-admin-api:write" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

                if [ -z "$PROVISIONER_TOKEN" ]; then
                  echo "Failed to get issuer token"
                  exit 1
                fi

              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${IH_URL}" \
                -H "Authorization: Bearer ${PROVISIONER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"roles\": [],
                  \"serviceEndpoints\": [
                    {
                      \"type\": \"CredentialService\",
                      \"serviceEndpoint\": \"http://identityhub.provider.svc.cluster.local:7082/api/credentials/v1/participants/${PARTICIPANT_ID}\",
                      \"id\": \"provider-credentialservice-1\"
                    },
                    {
                      \"type\": \"ProtocolEndpoint\",
                      \"serviceEndpoint\": \"http://controlplane.provider.svc.cluster.local:8082/api/dsp\",
                      \"id\": \"provider-dsp\"
                    }
                  ],
                  \"active\": true,
                  \"participantId\": \"${PARTICIPANT_DID}\",
                  \"participantContextId\": \"${PARTICIPANT_ID}\",
                  \"did\": \"${PARTICIPANT_DID}\",
                  \"key\": {
                    \"keyId\": \"${PARTICIPANT_DID}#key-1\",
                    \"privateKeyAlias\": \"${PARTICIPANT_DID}#key-1\",
                    \"keyGeneratorParams\": {
                      \"algorithm\": \"EC\"
                    }
                  }
                }")
              HTTP_STATUS=$(echo "${RESPONSE}" | tail -n1)
              BODY=$(echo "${RESPONSE}" | sed '$d')
              if [ "${HTTP_STATUS}" -eq 200 ] || [ "${HTTP_STATUS}" -eq 201 ]; then
                echo "✓ provider participant context created"
              elif [ "${HTTP_STATUS}" -eq 409 ]; then
                echo "⚠ provider participant context already exists (HTTP 409), skipping."
              else
                echo "✗ Unexpected HTTP status: ${HTTP_STATUS}"
                echo "Response body: ${BODY}"
                exit 1
              fi

              

              echo ""
              echo "================================================"
              echo "IdentityHub seeding completed successfully!"
              echo "================================================"