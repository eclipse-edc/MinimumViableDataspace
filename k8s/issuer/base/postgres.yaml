apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: issuer
  labels:
    type: edc-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        platform: edcv
        type: edc-infra
    spec:
      containers:
        - name: postgres
          image: postgres:17.7-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "issuerservice"
            - name: POSTGRES_USER
              value: "issuer"
            - name: POSTGRES_PASSWORD
              value: "issuer"
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: issuer
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: issuer
data:
  init.sql: |
    GRANT ALL PRIVILEGES ON DATABASE issuerservice TO issuer;
    \c issuerservice
    GRANT ALL ON SCHEMA public TO issuer;

    CREATE DATABASE keycloak;
    CREATE USER kc WITH PASSWORD 'kc';
    GRANT ALL PRIVILEGES ON DATABASE keycloak TO kc;
    \c keycloak
    GRANT ALL ON SCHEMA public TO kc;